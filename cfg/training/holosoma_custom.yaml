# holosoma_custom training — Willow WBT module config
# Repo: Guillaume-Bsst/holosoma_custom (src/holosoma/)

native_input_format: holosoma_trainer_npz
native_output_format: policy_pt

simulators:
  isaacgym:
    env: hscgym
    setup_script: modules/third_party/holosoma_custom/scripts/source_isaacgym_setup.sh
    cmd: python modules/02_training/holosoma_custom/train_agent.py
    extra_args: simulator:isaacgym

  isaacsim:
    env: hscsim
    setup_script: modules/third_party/holosoma_custom/scripts/source_isaacsim_setup.sh
    cmd: python modules/02_training/holosoma_custom/train_agent.py
    extra_args: simulator:isaacsim

  mjwarp:
    env: hscmujoco
    setup_script: modules/third_party/holosoma_custom/scripts/source_mujoco_setup.sh
    cmd: python modules/02_training/holosoma_custom/train_agent.py
    extra_args: simulator:mjwarp

args:
  motion_file:    --motion-data.motion-file
  robot:          --exp
  output_dir:     --logger.log-dir
  num_envs:       --training.num-envs
  checkpoint:     --training.checkpoint
