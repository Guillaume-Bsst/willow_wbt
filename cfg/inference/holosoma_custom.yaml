# holosoma_custom inference — Willow WBT module config
# Repo: Guillaume-Bsst/holosoma_custom (src/holosoma_inference/)

native_input_format: policy_pt
native_output_format: unitree_ros2_cmd

env: hscinference
env_prefix: $HOME/.holosoma_custom_deps/miniconda3/envs/hscinference

entry_points:
  ros2:
    cmd: >
      unset PYTHONPATH ROS_DISTRO AMENT_PREFIX_PATH CMAKE_PREFIX_PATH &&
      export PATH=$PATH:$HOME/.willow_deps/miniconda3/envs/unitree_control_interface/bin &&
      source modules/04_deployment/unitree_ros2/cyclonedds_ws/install/setup.bash &&
      source <(ros2 run unitree_control_interface autoset_environment_dds.py SIMULATION) &&
      $HOME/.holosoma_custom_deps/miniconda3/envs/hscinference/bin/python modules/03_inference/holosoma_inference_custom/run_policy.py
    extra_args: "--robot.sdk-type ros2"
    args:
      config:      # positional
      model_path:  --task.model-path
