# holosoma_inference_custom — Willow WBT module config
# Repo: Guillaume-Bsst/holosoma_custom (src/holosoma_inference/)
# Install: follow modules/third_party/holosoma_custom/scripts/source_inference_setup.sh
# Ecosystem: ~/.holosoma_custom_deps/
#
# Custom additions over upstream:
#   - sdk_type: ros2  →  publishes joint commands via ROS2 (/holosoma/low_cmd)
#                         requires unitree_control_interface env for the receiving side

env: hscinference

# Entry point
entry_points:
  sim:
    cmd: python modules/03_inference/holosoma_inference_custom/holosoma_inference/run_policy.py
    args:
      config:      # positional, e.g. inference:g1-29dof-wbt
      model_path:  --task.model-path
      motion_file: --task.motion-file   # for WBT mode
      sdk_type:    --robot.sdk-type     # mujoco (default) | ros2

  real:
    cmd: python modules/03_inference/holosoma_inference_custom/holosoma_inference/run_policy.py
    args:
      config:      # positional, e.g. inference:g1-29dof-wbt
      model_path:  --task.model-path
      motion_file: --task.motion-file
      sdk_type:    --robot.sdk-type     # unitree (default) | ros2

  ros2:
    # sim-to-sim or sim-to-real via ROS2 bridge
    # requires: conda activate unitree_control_interface && source cyclonedds_ws/install/setup.bash
    cmd: python modules/03_inference/holosoma_inference_custom/holosoma_inference/run_policy.py
    args:
      config:      # positional, e.g. inference:g1-29dof-wbt
      model_path:  --task.model-path
      motion_file: --task.motion-file
      sdk_type:    --robot.sdk-type     # ros2
